name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير البيئة القديمة وبناء كود المتجر الشامل النقي بجميع ميزاته الفاخرة سحابياً 
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    - name: Install All dependencies
      run: flutter pub get

    # 💥 البناء بصيغة الـ Debug الفولاذية المعفاة تماماً من حظر الحماية وجوجل ليعمل الموبايل فوراً
    - name: Build Anti-Block Debug APK
      run: flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation

    # 🎯 الضربة القاضية الجبرية: رفع الـ APK وتوليد رابط تحميل مباشر ومجاني صريح داخل السجلات لتخطي عوائق جيت هاب نهائياً
    - name: Generate Direct GoFile Download Link
      run: |
        echo "======================================================== "
        echo "🚀 رابط تحميل تطبيق متجر سوريا الإلكتروني المباشر الفولاذي: "
        curl -F "file=@build/app/outputs/flutter-apk/app-debug.apk" https://gofile.io
        echo "======================================================== "
