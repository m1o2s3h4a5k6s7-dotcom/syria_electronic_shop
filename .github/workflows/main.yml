name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 الضربة القاضية: تدمير كاش المخدم كلياً وتوليد مجرد مشروع فلاتر خام وجديد تماماً
    - name: Absolute Environment Purge & Recreate
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ windows/ linux/ macos/
        flutter create --org com.example --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
    # 🎯 سحب وحقن كود ملف main.dart الأصلي المتكامل من روابط الخوادم الرسمية المستقرة
    - name: Download Master main.dart Code
      run: |
        curl -sL "https://githubusercontent.com" > lib/main.dart

    # 🎯 سحب وحقن كود ملف add_product.dart الصافي للموبايل من الخوادم الرسمية المستقرة
    - name: Download Clean add_product.dart Code
      run: |
        curl -sL "https://githubusercontent.com" > lib/add_product.dart
    # 🎯 حقن ملف جافا الصافي لقطع دابر أي تداخلات كوتلن قديمة على السيرفر
    - name: Inject Clean Java MainActivity
      run: |
        mkdir -p android/app/src/main/java/com/example/syria_electronic_shop
        cat << 'EOF' > android/app/src/main/java/com/example/syria_electronic_shop/MainActivity.java
        package com.example.syria_electronic_shop;
        import io.flutter.embedding.android.FlutterActivity;
        public class MainActivity extends FlutterActivity { }
        EOF

    - name: Install All dependencies
      run: flutter pub get

    - name: Build APK Document
      run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: syria-shop-app
        path: build/app/outputs/flutter-apk/app-release.apk
