name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🎯 أولاً: تنظيف وتصفير البيئة القديمة وبناء أرشيف جيت نظيف 100% قبل جلب المحركات
    - name: Absolute Environment Reset
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock

    # 🎯 ثانياً: استدعاء جافا وفلاتر الرسميين والمستقرين سحابياً لتهيئة خط الإنتاج
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 ثالثاً: توليد مجسم التطبيق الجديد وسحب الأكواد الرسمية المحدثة بجميع ميزاتك الفاخرة
    - name: Generate Clean App & Inject Code
      run: |
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    # 🎯 رابعاً: حزم وضغط مجلدات المتجر المطور داخل كبسولة ZIP لتخطي الحظر الدولي 100%
    - name: Anonymous Zip Packaging and Force Push
      run: |
        mkdir -p production_capsule
        zip -r production_capsule/syria-store-project.zip lib/ android/ pubspec.yaml
        git add production_capsule/syria-store-project.zip
        git commit -m "تأمين وحفظ باقة أكواد متجر سوريا المصلحة من الكراش 🚀" || true
        git push origin main --force || true
