name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير البيئة القديمة المعطلة وبناء كود المتجر الشامل النقي بجميع ميزاته الفاخرة سحابياً 
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    - name: Install All dependencies
      run: flutter pub get

    # 💥 البناء بصيغة الـ Debug الفولاذية المعفاة تماماً من حظر الحماية وجوجل ليعمل الموبايل فوراً وبدون كراش
    - name: Build Anti-Block Debug APK
      run: flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation

    # 🎯 الضربة القاضية الجبرية: تصدير الـ APK كإصدار رسمي ثابت للأبد بداخل مستودعك لتنزيله المباشر بنقرة واحدة
    - name: Create Official GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: Official Syria Store Release
        files: build/app/outputs/flutter-apk/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
