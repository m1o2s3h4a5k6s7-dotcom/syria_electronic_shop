name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🎯 تهيئة محركات جافا وفلاتر الرسمية والمستقرة سحابياً لإعطاء الصلاحيات الفيدرالية للمخدم
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير الكاش المعطل وتوليد مجسم التطبيق النقي بجميع ميزاته الفاخرة سحابياً
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    - name: Install All dependencies
      run: flutter pub get

    # 💥 البناء بصيغة الـ Debug الفولاذية المعفاة تماماً من حظر الحماية وجوجل ليعمل الموبايل فوراً وبدون كراش
    - name: Build Anti-Block Debug APK
      run: flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation

    # 🎯 الضربة القاضية الجبرية: تحويل التطبيق إلى ملف ثابت ونشره عبر صفحات جيت هاب الرسمية المعفاة من الحظر
    - name: Construct Static Page Delivery
      run: |
        mkdir -p public_site
        cp build/app/outputs/flutter-apk/app-debug.apk public_site/index.html
        echo "✅ تم النشر بأمان كامل!"

    - name: Upload Pages Configuration
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'public_site'

    - name: Deploy to GitHub Pages Force
      uses: actions/deploy-pages@v4
