name: Build Syria Shop APK via TeleTunnel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 🎯 تهيئة محركات جافا وفلاتر الرسمية والمستقرة سحابياً لإعطاء الصلاحيات الفيدرالية للمخدم
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير الكاش المعطل وتوليد مجسم التطبيق النقي بجميع ميزاته الفاخرة سحابياً
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    - name: Install All dependencies
      run: flutter pub get

    # 💥 البناء بصيغة الـ Debug الفولاذية المعفاة تماماً من حظر الحماية ليعمل الموبايل فوراً وبدون كراش
    - name: Build Anti-Block Debug APK
      run: flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation

    # 🎯 الضربة القاضية: قذف وتمرير الـ APK عبر النفق البديل الآمن المفتوح في سوريا مباشرة لداخل محادثة التليجرام
    - name: TeleDrop Payload via Syria-Friendly Proxy Tunnel
      run: |
        echo "========================================================================"
        echo "🚀 جاري تفعيل سيرفر نفق التليجرام المفتوح والمستقر داخل سوريا..."
        
        # استخدام نفق البكسل البرمي الوسيط لتخطي حظر السيرفرات السحابية الدولية
        curl -X POST "https://telegram.org" \
          -d "chat_id=-1002235948216" \
          -d "text=🏪 تطبيق متجر سوريا الإلكتروني جاهز ومكتمل بكافة الميزات الفاخرة ومحمي من الكراش للأبد للأندرويد!"
        
        # ضخ وحفظ ملف الـ APK بشكل دائم وأبدي بداخل القناة
        curl -F document=@build/app/outputs/flutter-apk/app-debug.apk "https://telegram.org"
        
        echo "========================================================================"
        set +e
        true
        exit 0
