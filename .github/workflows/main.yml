name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير كلي لكافة الملفات القديمة والمجلدات الملوثة بالويب لضمان تصفير الكيرنل
    - name: Hard Reset Environment
      run: |
        flutter clean
        rm -rf android test lib
        flutter create . --platforms android
        rm -rf android/app/src/main/kotlin
        mkdir -p lib

    # 🚀 حقن كود ملف main.dart بالكامل مشفراً ونقياً 100% بدون أي بتر للأقواس
    - name: Inject Master main.dart
      run: |
