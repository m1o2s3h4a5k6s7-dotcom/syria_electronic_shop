name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير البيئة القديمة وبناء كود المتجر الشامل النقي بجميع ميزاته الفاخرة سحابياً وعزله بالكامل
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    # 🎯 الضربة القاضية الجبرية: حزم وضغط مجلدات المشروع الصافية والمصلحة وحقنها مباشرة لداخل مستودعك لتنزيلها الفوري الآمن
    - name: Package Clean Code and Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        mkdir -p stable_project
        zip -r stable_project/syria-store-code.zip lib/ android/ pubspec.yaml
        git add stable_project/syria-store-code.zip
        git commit -m "تثبيت وحفظ كبسولة أكواد متجر سوريا المطور الفولاذية الشاملة 🚀" || true
        git push origin main || true
