name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 🎯 السطر السحري: إجبار السيرفر على استخدام البيئة الحديثة وتخطي تحذيرات الإصدارات القديمة كلياً
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # استخدام أحدث إصدارات الحزم المتوافقة مع السيرفرات السحابية العالمية
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # تدمير وإعادة توليد المجلد من الجذور لضمان بناء جافا النقي كلياً
    - name: Hard Reset Android Directory
      run: |
        rm -rf android
        flutter create . --platforms android
        rm -rf android/app/src/main/kotlin

    # حقن ملف جافا الصافي وتأمين الأقواس بنسبة 100%
    - name: Inject Clean Java MainActivity
      run: |
        mkdir -p android/app/src/main/java/com/example/syria_electronic_shop
        cat << 'EOF' > android/app/src/main/java/com/example/syria_electronic_shop/MainActivity.java
        package com.example.syria_electronic_shop;

        import io.flutter.embedding.android.FlutterActivity;

        public class MainActivity extends FlutterActivity {
        }
        EOF

    - name: Install All dependencies
      run: flutter pub get

    - name: Build APK Document
      run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: syria-shop-app
        path: build/app/outputs/flutter-apk/app-release.apk
