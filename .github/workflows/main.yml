name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 تدمير البيئة القديمة وبناء كود المتجر الشامل النقي بملف واحد مدمج
    - name: Purge Environment & Generate Clean App
      run: |
        flutter clean
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml

    - name: Install All dependencies
      run: flutter pub get

    - name: Build APK Document
      run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: syria-shop-app
        path: build/app/outputs/flutter-apk/app-release.apk
