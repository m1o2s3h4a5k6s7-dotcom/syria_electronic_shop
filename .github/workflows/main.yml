name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # 🎯 تدمير كاش الـ VS Code القديم كلياً وتوليد مجسم التطبيق الفولاذي الجديد بنقاء 100%
    - name: Pure Cloud Environment Reconstruction
      run: |
        rm -rf test/ lib/ android/ ios/ web/ pubspec.yaml pubspec.lock .git/
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git init
        git remote add origin https://github.com
        git branch -M main
        flutter create --org com.syriashoppro --project-name syria_electronic_shop .
        rm -rf android/app/src/main/kotlin
        mkdir -p lib
        curl -sL "https://githubusercontent.com" > lib/main.dart
        curl -sL "https://githubusercontent.com" > pubspec.yaml
        curl -sL "https://githubusercontent.com" > android/app/src/main/AndroidManifest.xml

    # 🎯 الضربة القاضية الجبرية: حزم وضغط مجلدات المشروع المطهرة وقذفها مباشرة لداخل مستودعك وتخطي الحظر الدولي 100%
    - name: Anonymous Zip Packaging and Force Push
      run: |
        mkdir -p production_capsule
        zip -r production_capsule/syria-store-project.zip lib/ android/ pubspec.yaml
        git add production_capsule/syria-store-project.zip
        git commit -m "تأمين وبث باقة أكواد متجر سوريا الإلكتروني الفولاذية المصلحة من الكراش 🚀" || true
        git push origin main --force || true
