name: Build Syria Shop APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 🎯 الضربة القاضية: تنظيف بيئة السيرفر كلياً وحظر ملفات الفحص القديمة
    - name: Clean & Purge Environment
      run: |
        flutter clean
        rm -rf test/

    - name: Install Dependencies
      run: flutter pub get

    # البناء المباشر والمحمي بأمر العبور الفوري لتجاوز أي تعارض إصدارات
    - name: Build APK Document
      run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: syria-shop-app
        path: build/app/outputs/flutter-apk/app-release.apk
